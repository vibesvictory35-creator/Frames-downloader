<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chief's Frame Grabber</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--accent:#3fb950;--text:#e6edf3;--muted:#8b949e;--border:#30363d;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;padding:24px;}
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:22px;margin-bottom:4px;}
  p.sub{color:var(--muted);margin-top:0;margin-bottom:24px;font-size:14px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  input[type=text], input[type=number], select{width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:#0d1117;color:var(--text);font-size:14px;margin-bottom:14px;}
  .row{display:flex;gap:12px;}
  .row > div{flex:1;}
  .btn-main{background:var(--accent);color:#0d1117;font-weight:600;border:none;padding:12px;border-radius:6px;width:100%;font-size:15px;cursor:pointer;margin-top:6px;}
  .btn-main:disabled{opacity:0.5;}
  .status{font-size:13px;color:var(--muted);margin-top:10px;}
  .meta-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
  .meta-box img{width:100%;border-radius:6px;margin-bottom:12px;}
  .meta-box h3{margin:0 0 4px;}
  .meta-sub{color:var(--muted);font-size:13px;margin:0 0 12px;}
  .desc-box{font-size:13px;white-space:pre-wrap;line-height:1.5;max-height:200px;overflow-y:auto;border:1px solid var(--border);padding:10px;border-radius:6px;}
  .tag{background:#21262d;border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:12px;margin:2px;display:inline-block;}
  #frames{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .frame-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .frame-card img{width:100%;display:block;}
  .frame-card .ts-label{padding:8px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
  .frame-card a{color:var(--accent);text-decoration:none;font-size:12px;}
  .error{color:#f85149;font-size:13px;padding:8px;}
  .note{font-size:12px;color:var(--muted);margin-top:-8px;margin-bottom:14px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Chief's Frame Grabber</h1>
  <p class="sub">Paste a link. Get clean frames from every scene change, plus full video info.</p>

  <div class="card">
    <label>YouTube URL</label>
    <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=...">

    <div class="row">
      <div>
        <label>Number of frames</label>
        <input type="number" id="framecount" value="10" min="1" max="60">
      </div>
      <div>
        <label>Quality</label>
        <select id="quality">
          <option value="720p">Up to 720p (faster)</option>
          <option value="1080p">Up to 1080p</option>
          <option value="best">Best available</option>
        </select>
      </div>
    </div>
    <p class="note">Frames are picked automatically from real scene changes in the video, not evenly spaced cuts.</p>

    <button type="button" class="btn-main" id="go">Process Video</button>
    <div class="status" id="status"></div>
  </div>

  <div id="meta-container"></div>
  <div id="frames"></div>
</div>

<script>
"use strict";

function log(msg) {
  console.log("[FrameGrabber]", msg);
}

function isLikelyYoutubeUrl(url) {
  return /youtube\.com|youtu\.be/i.test(url);
}

function escapeHtml(str) {
  var div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function renderMetadata(d) {
  var container = document.getElementById("meta-container");
  var box = document.createElement("div");
  box.className = "meta-box";

  var tagsHtml = "";
  if (d.tags && d.tags.length) {
    for (var i = 0; i < d.tags.length; i++) {
      tagsHtml += '<span class="tag">' + escapeHtml(d.tags[i]) + "</span>";
    }
  } else {
    tagsHtml = '<span style="color:var(--muted);">No tags</span>';
  }

  var dur = "-";
  if (d.duration_seconds) {
    var mins = Math.floor(d.duration_seconds / 60);
    var secs = d.duration_seconds % 60;
    dur = mins + ":" + (secs < 10 ? "0" : "") + secs;
  }

  var viewsText = d.view_count ? d.view_count.toLocaleString() + " views" : "";
  var descText = escapeHtml(d.description || "No description");
  var catText = d.category || (d.categories && d.categories.join(", ")) || "-";

  var html = "";
  if (d.best_thumbnail) {
    html += '<img src="' + d.best_thumbnail + '">';
  }
  html += "<h3>" + escapeHtml(d.title || "Untitled") + "</h3>";
  html += '<p class="meta-sub">' + escapeHtml(d.channel || "Unknown channel") + " - " + dur + " - " + viewsText + "</p>";
  html += '<div class="desc-box">' + descText + "</div>";
  html += '<div style="margin-top:12px;"><b style="font-size:13px;">Tags:</b><br>' + tagsHtml + "</div>";
  html += '<p style="font-size:13px;margin-top:12px;"><b>Category:</b> ' + escapeHtml(catText) + "</p>";
  html += '<p style="font-size:12px;color:var(--muted);margin-top:8px;">Uploaded: ' + (d.upload_date || "-") + " - Likes: " + (d.like_count != null ? d.like_count : "-") + " - Comments: " + (d.comment_count != null ? d.comment_count : "-") + "</p>";

  box.innerHTML = html;
  container.appendChild(box);
}

function renderFrames(frames, detectedChanges, requested) {
  var container = document.getElementById("frames");
  var note = document.createElement("p");
  note.className = "note";
  note.style.marginTop = "0";
  note.textContent = "Detected " + detectedChanges + " scene changes, extracted " + frames.length + " of " + requested + " requested frames.";
  container.parentElement.insertBefore(note, container);

  frames.forEach(function (r) {
    var card = document.createElement("div");
    card.className = "frame-card";
    if (r.ok) {
      card.innerHTML = '<img src="/api/frame/' + r.file + '"><div class="ts-label"><span>' + r.timestamp + '</span><a href="/api/frame/' + r.file + '" download>Download</a></div>';
    } else {
      card.innerHTML = '<div class="error">' + r.timestamp + ": " + r.error + "</div>";
    }
    container.appendChild(card);
  });
}

async function run() {
  log("run() triggered");
  var url = document.getElementById("url").value.trim();
  var quality = document.getElementById("quality").value;
  var frameCount = parseInt(document.getElementById("framecount").value) || 10;
  var status = document.getElementById("status");
  var metaContainer = document.getElementById("meta-container");
  var framesContainer = document.getElementById("frames");
  var btn = document.getElementById("go");

  status.textContent = "";
  metaContainer.innerHTML = "";
  framesContainer.innerHTML = "";

  if (!url) {
    status.textContent = "Enter a YouTube URL.";
    return;
  }
  if (!isLikelyYoutubeUrl(url)) {
    status.textContent = "That doesn't look like a YouTube URL. Paste the full link (youtube.com or youtu.be).";
    return;
  }

  btn.disabled = true;
  status.textContent = "Fetching info and scanning for scene changes... this can take a while depending on video length.";

  try {
    log("Sending request to /api/process");
    var res = await fetch("/api/process", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: url, frame_count: frameCount, quality: quality })
    });
    var data = await res.json();
    log("Response status: " + res.status);

    if (!res.ok) {
      status.textContent = data.detail || "Something went wrong (status " + res.status + ").";
      btn.disabled = false;
      return;
    }

    status.textContent = "Done.";
    renderMetadata(data.metadata);
    renderFrames(data.frames, data.detected_changes, frameCount);
  } catch (e) {
    log("Request failed: " + e.message);
    status.textContent = "Request failed: " + e.message;
  }
  btn.disabled = false;
}

document.getElementById("go").addEventListener("click", run);
log("Script loaded and handlers bound.");
</script>
</body>
</html>
